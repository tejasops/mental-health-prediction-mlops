apiVersion: apps/v1
kind: Deployment
metadata:
  name: mental-health-api
  namespace: mental-health
  labels:
    app: mental-health-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mental-health-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mental-health-api
    spec:
      containers:
        - name: mental-health-api
          image: tejasops/mental-health-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
