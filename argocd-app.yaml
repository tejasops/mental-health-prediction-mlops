apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mental-health-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tejasops/mental-health-prediction-mlops
    targetRevision: HEAD
    path: mental-health-api
    helm:
      releaseName: mental-health-api
  destination:
    server: https://kubernetes.default.svc
    namespace: mental-health
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
